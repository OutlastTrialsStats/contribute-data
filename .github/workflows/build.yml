name: Build Windows Executable

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'outlast_analyzer.py'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'outlast_analyzer.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Get version and generate Windows version info
        id: version
        shell: python
        run: |
          import re, os

          with open("outlast_analyzer.py") as f:
              version = re.search(r'__version__ = "(.+)"', f.read()).group(1)

          parts = list(map(int, version.split(".")))
          while len(parts) < 3:
              parts.append(0)
          maj, min_, patch = parts[0], parts[1], parts[2]

          vi = "\n".join([
              "VSVersionInfo(",
              "  ffi=FixedFileInfo(",
              f"    filevers=({maj}, {min_}, {patch}, 0),",
              f"    prodvers=({maj}, {min_}, {patch}, 0),",
              "    mask=0x3f,",
              "    flags=0x0,",
              "    OS=0x40004,",
              "    fileType=0x1,",
              "    subtype=0x0,",
              "    date=(0, 0)",
              "  ),",
              "  kids=[",
              "    StringFileInfo([",
              "      StringTable(",
              "        u'040904B0',",
              "        [StringStruct(u'CompanyName', u'OutlastTrialsStats'),",
              "         StringStruct(u'FileDescription', u'OutlastTrials Stats Monitor'),",
              f"         StringStruct(u'FileVersion', u'{version}'),",
              "         StringStruct(u'InternalName', u'TOTStatsMonitor'),",
              "         StringStruct(u'OriginalFilename', u'TOTStatsMonitor.exe'),",
              "         StringStruct(u'ProductName', u'OutlastTrials Stats Contributor'),",
              f"         StringStruct(u'ProductVersion', u'{version}')])]),",
              "    VarFileInfo([VarStruct(u'Translation', [0x0409, 1200])])",
              "  ])",
          ])

          with open("version_info.txt", "w") as f:
              f.write(vi)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")

      - name: Build executable
        run: |
          pyinstaller --onefile --noconsole --name TOTStatsMonitor --version-file version_info.txt outlast_analyzer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TOTStatsMonitor-v${{ steps.version.outputs.version }}
          path: dist/TOTStatsMonitor.exe
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/TOTStatsMonitor.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}